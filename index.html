<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Hi Deepu 🌸</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  margin:0;
  padding:0;

  height:100vh;

  overflow:hidden;

  display:flex;

  justify-content:center;

  align-items:center;

  background:linear-gradient(
    135deg,
    #ffdde1,
    #ee9ca7,
    #c9d6ff
  );

  background-size:400% 400%;

  animation:bg 12s ease infinite;

  transition:1s;

  color:white;
}

@keyframes bg{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

.container{

  width:90%;

  max-width:700px;

  padding:35px;

  border-radius:30px;

  background:rgba(255,255,255,0.15);

  backdrop-filter:blur(12px);

  text-align:center;

  box-shadow:0 0 25px pink;

  animation:glow 5s infinite alternate;

  position:relative;

  z-index:10;
}

@keyframes glow{

  0%{
    box-shadow:0 0 20px #ff7eb3;
  }

  100%{
    box-shadow:0 0 35px #c9a0ff;
  }
}

#greeting{

  position:absolute;

  top:20px;
  left:20px;

  background:rgba(255,255,255,0.15);

  padding:12px 18px;

  border-radius:20px;

  font-weight:bold;

  backdrop-filter:blur(10px);

  z-index:20;
}

h1{

  font-size:3rem;

  margin-bottom:20px;
}

#time{

  font-size:4rem;

  font-weight:bold;
}

#date{

  margin-top:10px;

  opacity:0.9;
}

.quote{

  margin-top:25px;

  line-height:1.8;

  font-size:1.1rem;
}

.search{

  margin-top:25px;
}

.search input{

  width:80%;

  padding:16px;

  border:none;

  border-radius:20px;

  outline:none;

  background:rgba(255,255,255,0.2);

  color:white;

  font-size:1rem;
}

.search input::placeholder{

  color:white;
}

.links{

  margin-top:30px;

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:15px;
}

.links a{

  text-decoration:none;

  color:white;

  padding:16px;

  border-radius:18px;

  background:rgba(255,255,255,0.18);

  transition:0.3s;
}

.links a:hover{

  transform:scale(1.05);

  background:rgba(255,255,255,0.3);
}

.heart{

  position:absolute;

  color:#ff4d88;

  animation:float 8s linear infinite;

  pointer-events:none;

  z-index:30;
}

@keyframes float{

  0%{
    transform:translateY(100vh);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:translateY(-120vh);
    opacity:0;
  }
}

.cloud{

  position:absolute;

  opacity:0.35;

  animation:cloudMove linear infinite;

  pointer-events:none;

  z-index:1;
}

@keyframes cloudMove{

  0%{
    transform:translateX(-20vw);
  }

  100%{
    transform:translateX(120vw);
  }
}

</style>

</head>

<body>

<div id="greeting">

Good Morning Deepu ☀️

</div>

<div class="container">

<h1>Hi Deepu 🌸</h1>

<div id="time">

00:00:00

</div>

<div id="date">

Loading...

</div>

<div class="quote">

Hey Deepu, hope today becomes beautiful 💫

<br><br>

Reminder: You're awesome 🌸

<br><br>

Drink water & conquer the day 😌

</div>

<div class="search">

<input
type="text"
id="search"
placeholder="Search Google..."
>

</div>

<div class="links">

<a href="https://youtube.com"
target="_blank">

YouTube 🎬

</a>

<a href="https://spotify.com"
target="_blank">

Spotify 🎵

</a>

<a href="https://instagram.com"
target="_blank">

Instagram 📸

</a>

<a href="https://pinterest.com"
target="_blank">

Pinterest 🌷

</a>

</div>

</div>

<audio autoplay loop>

<source
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=lofi-study-112191.mp3"
type="audio/mpeg">

</audio>

<script>

function updateTime(){

  const now = new Date();

  document.getElementById("time").innerHTML =
  now.toLocaleTimeString();

  document.getElementById("date").innerHTML =
  now.toDateString();
}

setInterval(updateTime,1000);

updateTime();

function updateGreeting(){

  const hour = new Date().getHours();

  let text = "";

  if(hour >= 5 && hour < 12){

    text = "Good Morning Deepu ☀️";

  }else if(hour >= 12 && hour < 17){

    text = "Good Afternoon Deepu 🌤️";

  }else if(hour >= 17 && hour < 21){

    text = "Good Evening Deepu 🌆";

  }else{

    text = "Hey Deepu, it's bedtime 🌙";
  }

  document.getElementById("greeting").innerHTML = text;
}

updateGreeting();

function updateTheme(){

  const hour = new Date().getHours();

  if(hour >= 18 || hour < 6){

    document.body.style.background =
    "linear-gradient(135deg,#0f172a,#1e293b,#312e81)";

  }else{

    document.body.style.background =
    "linear-gradient(135deg,#ffdde1,#ee9ca7,#c9d6ff)";
  }
}

updateTheme();

document.getElementById("search")
.addEventListener("keypress",function(e){

  if(e.key === "Enter"){

    const q = this.value;

    window.location.href =
    "https://www.google.com/search?q=" +
    encodeURIComponent(q);
  }
});

function createHeart(){

  const heart = document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left =
  Math.random()*100 + "vw";

  heart.style.fontSize =
  (15 + Math.random()*20) + "px";

  document.body.appendChild(heart);

  setTimeout(()=>{

    heart.remove();

  },8000);
}

setInterval(createHeart,500);

function createCloud(){

  const cloud = document.createElement("div");

  cloud.classList.add("cloud");

  cloud.innerHTML = "☁️";

  cloud.style.top =
  Math.random()*70 + "vh";

  cloud.style.animationDuration =
  (25 + Math.random()*20) + "s";

  cloud.style.fontSize =
  (40 + Math.random()*50) + "px";

  document.body.appendChild(cloud);

  setTimeout(()=>{

    cloud.remove();

  },45000);
}

setInterval(createCloud,4000);

</script>

</body>
</html>
