<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0" />

<title>BGMI Gamer Homepage</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  padding:20px;

  display:flex;

  justify-content:center;

  align-items:center;

  background:linear-gradient(
    135deg,
    #0a0f1f,
    #111827,
    #14532d
  );

  color:white;

  overflow:hidden;
}

#greeting{

  position:fixed;

  top:12px;
  left:12px;

  max-width:80vw;

  background:rgba(0,0,0,0.5);

  border:2px solid #22c55e;

  padding:10px 14px;

  border-radius:14px;

  font-size:clamp(0.8rem,3vw,1rem);

  color:white;

  box-shadow:0 0 15px rgba(34,197,94,0.8);

  z-index:999;

  font-weight:bold;

  backdrop-filter:blur(10px);
}

#fpsCounter{

  position:fixed;

  top:12px;
  right:12px;

  background:rgba(0,0,0,0.5);

  border:2px solid #22c55e;

  padding:10px 14px;

  border-radius:14px;

  font-size:clamp(0.8rem,3vw,1rem);

  color:#22c55e;

  box-shadow:0 0 15px rgba(34,197,94,0.8);

  z-index:999;

  font-weight:bold;

  backdrop-filter:blur(10px);
}

.container{

  text-align:center;

  width:min(92vw,700px);

  backdrop-filter:blur(10px);

  background:rgba(0,0,0,0.45);

  padding:30px;

  border-radius:24px;

  box-shadow:0 0 30px rgba(34,197,94,0.35);

  position:relative;

  z-index:10;

  max-height:90vh;

  overflow:auto;
}

.rgb-glow{

  animation:rgbGlow 6s linear infinite;
}

@keyframes rgbGlow{

  0%{
    box-shadow:0 0 20px #ff0000;
  }

  25%{
    box-shadow:0 0 20px #00ff00;
  }

  50%{
    box-shadow:0 0 20px #00ffff;
  }

  75%{
    box-shadow:0 0 20px #ff00ff;
  }

  100%{
    box-shadow:0 0 20px #ff0000;
  }
}

h1{

  font-size:clamp(2rem,7vw,3rem);

  margin-bottom:10px;
}

#time{

  font-size:clamp(2.5rem,10vw,4rem);

  font-weight:bold;

  margin:20px 0;
}

#date{

  font-size:clamp(0.9rem,3vw,1.2rem);

  opacity:0.8;

  margin-bottom:30px;
}

.search-box{

  display:flex;

  justify-content:center;

  margin-bottom:30px;
}

.search-box input{

  width:80%;

  padding:16px;

  border:none;

  border-radius:14px;

  font-size:1rem;

  outline:none;

  background:rgba(20,83,45,0.45);

  color:white;
}

.search-box input::placeholder{

  color:#cbd5e1;
}

.links{

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:16px;
}

.link-card{

  padding:18px;

  border-radius:16px;

  text-decoration:none;

  color:white;

  background:rgba(20,83,45,0.45);

  transition:0.3s;
}

.link-card:hover{

  transform:translateY(-5px) scale(1.03);

  background:rgba(34,197,94,0.35);
}

.quote{

  margin-top:25px;

  font-style:italic;

  opacity:0.85;

  font-size:clamp(0.9rem,3vw,1rem);
}

.rgb-line{

  position:absolute;

  width:100%;

  height:3px;

  top:0;
  left:0;

  background:linear-gradient(
    90deg,
    red,
    orange,
    yellow,
    green,
    cyan,
    blue,
    violet
  );

  background-size:400%;

  animation:rgbMove 5s linear infinite;
}

@keyframes rgbMove{

  0%{
    background-position:0%;
  }

  100%{
    background-position:400%;
  }
}

.particle{

  position:absolute;

  width:6px;

  height:6px;

  border-radius:50%;

  background:#22c55e;

  opacity:0.7;

  animation:floatParticle 10s linear infinite;

  z-index:1;
}

@keyframes floatParticle{

  0%{
    transform:translateY(100vh);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:translateY(-120vh);
    opacity:0;
  }
}

@media (max-width:600px){

  .links{

    grid-template-columns:1fr;
  }

  .search-box input{

    width:100%;
  }

  .container{

    padding:24px;
  }

  .quote{

    font-size:0.95rem;
  }
}

</style>

</head>

<body>

<div id="greeting">

Hey...

</div>

<div id="fpsCounter">

FPS: 90

</div>

<div class="container rgb-glow">

<div class="rgb-line"></div>

<h1>BGMI COMMAND CENTER</h1>

<div id="time">

00:00:00

</div>

<div id="date">

Loading date...

</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Google..." />

</div>

<div class="links">

<a class="link-card"
href="https://www.battlegroundsmobileindia.com"
target="_blank">

BGMI

</a>

<a class="link-card"
href="https://www.youtube.com/results?search_query=bgmi"
target="_blank">

BGMI Videos

</a>

<a class="link-card"
href="https://discord.com"
target="_blank">

Discord

</a>

<a class="link-card"
href="https://store.steampowered.com"
target="_blank">

Steam

</a>

</div>

<div class="quote">

“Winner Winner Chicken Dinner.”

</div>

</div>

<script>

function updateTime(){

  const now = new Date();

  const time = now.toLocaleTimeString();

  const date = now.toLocaleDateString(
    undefined,
    {
      weekday:'long',
      year:'numeric',
      month:'long',
      day:'numeric'
    }
  );

  document.getElementById('time').textContent =
  time;

  document.getElementById('date').textContent =
  date;
}

setInterval(updateTime,1000);

updateTime();

function updateGreeting(){

  const hour =
  new Date().getHours();

  let greeting = "";

  if(hour >= 5 && hour < 12){

    greeting =
    "Hey, Good Morning ☀️";

  }else if(hour >= 12 && hour < 17){

    greeting =
    "Hey, Good Afternoon 🌤️";

  }else if(hour >= 17 && hour < 21){

    greeting =
    "Hey, Good Evening 🌆";

  }else{

    greeting =
    "Hey, It's Bed Time 🌙";
  }

  document.getElementById("greeting")
  .textContent = greeting;
}

updateGreeting();

let fps = 90;

setInterval(()=>{

  fps = 85 + Math.floor(Math.random()*6);

  document.getElementById('fpsCounter')
  .textContent = `FPS: ${fps}`;

},1000);

document.getElementById('search')
.addEventListener('keypress',
function(e){

  if(e.key === 'Enter'){

    const query = this.value;

    window.location.href =
    `https://www.google.com/search?q=${encodeURIComponent(query)}`;
  }

});

function createParticle(){

  const particle =
  document.createElement("div");

  particle.classList.add("particle");

  particle.style.left =
  Math.random()*100 + "vw";

  particle.style.animationDuration =
  (6 + Math.random()*8) + "s";

  document.body.appendChild(particle);

  setTimeout(()=>{

    particle.remove();

  },12000);
}

setInterval(createParticle,300);

</script>

</body>

</html>
